# Crea el fitxer docker-compose.yml a l'arrel del projecte. Aquest fitxer definirà dos serveis: 
# el servidor MongoDB i el client Mongo Express per gestionar la base de dades des del navegador.

# /* 1.1 Servei MongoDB
# El servei de MongoDB ha de complir els requisits següents:
# ● Imatge: mongo:7.0
# ● Nom del contenidor: mongodb-botiga
# ● Port exposat: 27017 (host) → 27017 (contenidor)
# ● Variables d'entorn: MONGO_INITDB_ROOT_USERNAME i MONGO_INITDB_ROOT_PASSWORD
# ● Volum: muntar ./data a /data/db per a la persistència
# ● Volum: muntar ./mongo-init a /docker-entrypoint-initdb.d per a la inicialització
# ● Xarxa: xarxa personalitzada (amb nom) anomenada xarxa-botiga*/
version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb-tienda
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: $david
      MONGO_INITDB_ROOT_PASSWORD: $david97
    volumes:
      - ./fecha:/fecha/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - red-tienda

  mongoexpress:  # ← Dentro de services, no afuera
    image: mongo-express:1.0
    container_name: mongoexpress-tienda
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: $david
      ME_CONFIG_MONGODB_ADMINPASSWORD: $david97
      ME_CONFIG_MONGODB_URL: mongodb://$david:$david97@mongodb-tienda:27017/
    restart: unless-stopped
    networks:
      - red-tienda

networks:
  red-tienda:
    driver: bridge

# 1.2 Servei Mongo Express
# Mongo Express és una interfície web per gestionar MongoDB. Ha de complir:
# ● Imatge: mongo-express:1.0
# ● Nom del contenidor: mongoexpress-botiga
# ● Port exposat: 8081 (host) → 8081 (contenidor)
# ● Dependència: ha d'arrancar després de mongodb-botiga